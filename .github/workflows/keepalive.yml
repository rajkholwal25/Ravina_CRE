name: Keep Render app awake

# Pings the app every ~10 minutes so Render's free tier doesn't spin down.
# After deploying, add a repository variable named RENDER_URL
#   (Settings → Secrets and variables → Actions → Variables → New variable)
#   e.g. RENDER_URL = https://dialysis-quiz.onrender.com
on:
  schedule:
    - cron: "*/8 * * * *"   # every 8 minutes
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="${{ vars.RENDER_URL }}"
          if [ -z "$URL" ]; then URL="https://ravina-cre.onrender.com"; fi
          echo "Pinging $URL/healthz"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 40 "$URL/healthz" || echo "000")
          echo "HTTP $code (a 200 keeps the Render free instance awake)"
