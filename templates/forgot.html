<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot password — Dialysis Quiz</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-brand"><span class="logo">🩺</span></div>
    <h1 class="auth-title">Forgot your password?</h1>
    <p class="auth-sub">Enter your email and we'll send you a reset link.</p>
    <form id="forgotForm" class="auth-form">
      <label class="field">Email
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </label>
      <div id="msg" class="auth-msg hidden"></div>
      <button type="submit" class="primary big" id="submitBtn">Send reset link →</button>
    </form>
    <p class="auth-switch">Remembered it? <a href="{{ url_for('login_page') }}">Back to log in</a></p>
  </div>
<script>
const $ = (s) => document.querySelector(s);
const msg = $("#msg");
function showMsg(t, ok) { msg.textContent = t; msg.className = "auth-msg " + (ok ? "ok" : "err"); }
$("#forgotForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = $("#submitBtn"); btn.disabled = true;
  msg.className = "auth-msg hidden";
  try {
    const r = await fetch("/api/forgot", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: $("#email").value }),
    });
    const data = await r.json();
    if (r.ok) { showMsg(data.message || "Check your email.", true); }
    else { showMsg(data.error || "Could not send reset link.", false); btn.disabled = false; }
  } catch (err) { showMsg("Network error. Is the server running?", false); btn.disabled = false; }
});
</script>
</body>
</html>
