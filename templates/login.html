<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log in — Dialysis Quiz</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-brand"><span class="logo">🩺</span></div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Log in to practice and track your progress.</p>
    <form id="loginForm" class="auth-form" autocomplete="on">
      <label class="field">Email
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </label>
      <label class="field">Password
        <input type="password" id="password" placeholder="Your password" required autocomplete="current-password">
      </label>
      <div id="msg" class="auth-msg hidden"></div>
      <button type="submit" class="primary big" id="submitBtn">Log in →</button>
    </form>
    <p class="auth-forgot"><a href="{{ url_for('forgot_page') }}">Forgot password?</a></p>
    <p class="auth-switch">Don't have an account? <a href="{{ url_for('signup_page') }}">Create one</a></p>
  </div>
<script>
const $ = (s) => document.querySelector(s);
const msg = $("#msg");
function showMsg(t, ok) { msg.textContent = t; msg.className = "auth-msg " + (ok ? "ok" : "err"); }
$("#loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = $("#submitBtn"); btn.disabled = true;
  msg.className = "auth-msg hidden";
  try {
    const r = await fetch("/api/login", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: $("#email").value, password: $("#password").value }),
    });
    let data = {}; try { data = await r.json(); } catch (e) {}
    if (r.ok) { window.location.href = "/"; }
    else { showMsg(data.error || (r.status >= 500 ? "Server is waking up — wait a few seconds and try again." : "Login failed."), false); btn.disabled = false; }
  } catch (err) { showMsg("Couldn't reach the server — it may be waking up. Try again in a few seconds.", false); btn.disabled = false; }
});
</script>
</body>
</html>
